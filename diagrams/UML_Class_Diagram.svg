<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .class-box { fill: #0d1117; stroke: #00f0ff; stroke-width: 2; }
      .class-header { fill: #00f0ff; fill-opacity: 0.2; }
      .text-title { fill: #ffffff; font-family: 'Inter', monospace; font-size: 16px; font-weight: bold; }
      .text-attr { fill: #aaaaaa; font-family: 'Inter', monospace; font-size: 14px; }
      .line { stroke: #ff0000; stroke-width: 2; fill: none; }
      .text-rel { fill: #ff0000; font-family: 'Inter', monospace; font-size: 12px; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <!-- Product Class -->
  <g transform="translate(350, 50)">
    <rect width="200" height="180" class="class-box" />
    <rect width="200" height="40" class="class-header" />
    <text x="100" y="25" class="text-title" text-anchor="middle">Product</text>
    <line x1="0" y1="40" x2="200" y2="40" stroke="#00f0ff" stroke-width="2" />
    <text x="10" y="65" class="text-attr">- ProductID: String</text>
    <text x="10" y="85" class="text-attr">- ProductName: String</text>
    <text x="10" y="105" class="text-attr">- StockQty: int</text>
    <text x="10" y="125" class="text-attr">- Price: decimal</text>
    <line x1="0" y1="140" x2="200" y2="140" stroke="#00f0ff" stroke-width="2" />
    <text x="10" y="165" class="text-attr">+ updateStock()</text>
  </g>

  <!-- Customer Class -->
  <g transform="translate(50, 250)">
    <rect width="200" height="160" class="class-box" />
    <rect width="200" height="40" class="class-header" />
    <text x="100" y="25" class="text-title" text-anchor="middle">Customer</text>
    <line x1="0" y1="40" x2="200" y2="40" stroke="#00f0ff" stroke-width="2" />
    <text x="10" y="65" class="text-attr">- CustomerID: String</text>
    <text x="10" y="85" class="text-attr">- FullName: String</text>
    <text x="10" y="105" class="text-attr">- TotalSpent: decimal</text>
    <line x1="0" y1="120" x2="200" y2="120" stroke="#00f0ff" stroke-width="2" />
    <text x="10" y="145" class="text-attr">+ placeOrder()</text>
  </g>

  <!-- Supplier Class -->
  <g transform="translate(650, 250)">
    <rect width="200" height="160" class="class-box" />
    <rect width="200" height="40" class="class-header" />
    <text x="100" y="25" class="text-title" text-anchor="middle">Supplier</text>
    <line x1="0" y1="40" x2="200" y2="40" stroke="#00f0ff" stroke-width="2" />
    <text x="10" y="65" class="text-attr">- SupplierID: String</text>
    <text x="10" y="85" class="text-attr">- CompanyName: String</text>
    <text x="10" y="105" class="text-attr">- LeadTime: int</text>
    <line x1="0" y1="120" x2="200" y2="120" stroke="#00f0ff" stroke-width="2" />
    <text x="10" y="145" class="text-attr">+ receivePO()</text>
  </g>

  <!-- Relationships -->
  <line x1="150" y1="250" x2="350" y2="140" class="line" />
  <text x="210" y="200" class="text-rel">Places Order &gt;</text>
  <text x="160" y="240" class="text-rel">1</text>
  <text x="330" y="130" class="text-rel">0..*</text>

  <line x1="750" y1="250" x2="550" y2="140" class="line" />
  <text x="600" y="200" class="text-rel">&lt; Supplies</text>
  <text x="730" y="240" class="text-rel">1</text>
  <text x="560" y="130" class="text-rel">1..*</text>

</svg>
