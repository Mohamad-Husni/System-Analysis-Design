<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .class-box { fill: #0d1117; stroke: #00f0ff; stroke-width: 2; }
      .class-header { fill: #00f0ff; fill-opacity: 0.2; }
      .text-title { fill: #ffffff; font-family: 'Inter', monospace; font-size: 16px; font-weight: bold; }
      .text-attr { fill: #aaaaaa; font-family: 'Inter', monospace; font-size: 13px; }
      .line { stroke: #ff0000; stroke-width: 2; fill: none; }
      .text-rel { fill: #ff0000; font-family: 'Inter', monospace; font-size: 12px; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <!-- Product Class -->
  <g transform="translate(400, 50)">
    <rect width="200" height="200" class="class-box" />
    <rect width="200" height="35" class="class-header" />
    <text x="100" y="23" class="text-title" text-anchor="middle">Product</text>
    <line x1="0" y1="35" x2="200" y2="35" stroke="#00f0ff" stroke-width="2" />
    <text x="10" y="55" class="text-attr">- ProductID: int</text>
    <text x="10" y="75" class="text-attr">- ProductName: string</text>
    <text x="10" y="95" class="text-attr">- Category: string</text>
    <text x="10" y="115" class="text-attr">- UnitPrice: decimal</text>
    <text x="10" y="135" class="text-attr">- QuantityInStock: int</text>
    <text x="10" y="155" class="text-attr">- ReorderLevel: int</text>
    <text x="10" y="175" class="text-attr">- BarcodeQR: string</text>
  </g>

  <!-- Customer Class -->
  <g transform="translate(50, 450)">
    <rect width="200" height="150" class="class-box" />
    <rect width="200" height="35" class="class-header" />
    <text x="100" y="23" class="text-title" text-anchor="middle">Customer</text>
    <line x1="0" y1="35" x2="200" y2="35" stroke="#00f0ff" stroke-width="2" />
    <text x="10" y="55" class="text-attr">- CustomerID: int</text>
    <text x="10" y="75" class="text-attr">- Name: string</text>
    <text x="10" y="95" class="text-attr">- Phone: string</text>
    <text x="10" y="115" class="text-attr">- Email: string</text>
    <text x="10" y="135" class="text-attr">- Address: string</text>
  </g>

  <!-- Supplier Class -->
  <g transform="translate(750, 50)">
    <rect width="200" height="150" class="class-box" />
    <rect width="200" height="35" class="class-header" />
    <text x="100" y="23" class="text-title" text-anchor="middle">Supplier</text>
    <line x1="0" y1="35" x2="200" y2="35" stroke="#00f0ff" stroke-width="2" />
    <text x="10" y="55" class="text-attr">- SupplierID: int</text>
    <text x="10" y="75" class="text-attr">- SupplierName: string</text>
    <text x="10" y="95" class="text-attr">- ContactNumber: string</text>
    <text x="10" y="115" class="text-attr">- Email: string</text>
    <text x="10" y="135" class="text-attr">- Address: string</text>
  </g>

  <!-- Sales Order Class -->
  <g transform="translate(400, 450)">
    <rect width="200" height="150" class="class-box" />
    <rect width="200" height="35" class="class-header" />
    <text x="100" y="23" class="text-title" text-anchor="middle">SalesOrder</text>
    <line x1="0" y1="35" x2="200" y2="35" stroke="#00f0ff" stroke-width="2" />
    <text x="10" y="55" class="text-attr">- OrderID: int</text>
    <text x="10" y="75" class="text-attr">- CustomerID: int</text>
    <text x="10" y="95" class="text-attr">- OrderDateTime: date</text>
    <text x="10" y="115" class="text-attr">- TotalAmount: decimal</text>
    <text x="10" y="135" class="text-attr">- PaymentStatus: string</text>
  </g>

  <!-- Order Item Class -->
  <g transform="translate(400, 280)">
    <rect width="200" height="150" class="class-box" />
    <rect width="200" height="35" class="class-header" />
    <text x="100" y="23" class="text-title" text-anchor="middle">OrderItem</text>
    <line x1="0" y1="35" x2="200" y2="35" stroke="#00f0ff" stroke-width="2" />
    <text x="10" y="55" class="text-attr">- OrderItemID: int</text>
    <text x="10" y="75" class="text-attr">- OrderID: int</text>
    <text x="10" y="95" class="text-attr">- ProductID: int</text>
    <text x="10" y="115" class="text-attr">- Quantity: int</text>
    <text x="10" y="135" class="text-attr">- Subtotal: decimal</text>
  </g>

  <!-- User Class -->
  <g transform="translate(750, 450)">
    <rect width="200" height="150" class="class-box" />
    <rect width="200" height="35" class="class-header" />
    <text x="100" y="23" class="text-title" text-anchor="middle">User</text>
    <line x1="0" y1="35" x2="200" y2="35" stroke="#00f0ff" stroke-width="2" />
    <text x="10" y="55" class="text-attr">- UserID: int</text>
    <text x="10" y="75" class="text-attr">- Username: string</text>
    <text x="10" y="95" class="text-attr">- Password: string</text>
    <text x="10" y="115" class="text-attr">- Role: string</text>
    <text x="10" y="135" class="text-attr">- Email: string</text>
  </g>

  <!-- Relationships -->
  
  <!-- Customer to SalesOrder -->
  <line x1="250" y1="525" x2="400" y2="525" class="line" />
  <text x="300" y="515" class="text-rel">Places &gt;</text>
  <text x="260" y="540" class="text-rel">1</text>
  <text x="380" y="540" class="text-rel">0..*</text>

  <!-- SalesOrder to OrderItem -->
  <line x1="500" y1="450" x2="500" y2="430" class="line" />
  <text x="510" y="445" class="text-rel">1</text>
  <text x="510" y="435" class="text-rel">1..*</text>

  <!-- OrderItem to Product -->
  <line x1="500" y1="280" x2="500" y2="250" class="line" />
  <text x="510" y="275" class="text-rel">0..*</text>
  <text x="510" y="265" class="text-rel">1</text>
  
  <!-- Supplier to Product -->
  <line x1="750" y1="125" x2="600" y2="125" class="line" />
  <text x="660" y="115" class="text-rel">&lt; Supplies</text>
  <text x="730" y="140" class="text-rel">1</text>
  <text x="610" y="140" class="text-rel">1..*</text>

</svg>
